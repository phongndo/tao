# Coderabbit Configuration
# Docs: https://docs.coderabbit.ai
# FREE for public repos — no quota, no API keys.

# ── PR Reviews ──
reviews:
  request_changes_workflow: true
  high_level_summary: true
  poem: false

  # Review ALL PRs from everyone — no gatekeeping
  auto_review:
    enabled: true
    drafts: true
    base_branches: ['main']

  # Skip generated files and binaries
  path_filters:
    - '!pnpm-lock.yaml'
    - '!out/**'
    - '!dist/**'
    - '!apps/desktop/out/**'
    - '!apps/desktop/dist/**'
    - '!apps/desktop/public/ghostty-vt.wasm'
    - '!*.png'
    - '!*.svg'
    - '!*.wasm'

# ── Chat ──
chat:
  auto_reply: true
