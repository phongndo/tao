name: CI

env:
  ZIG_VERSION: '0.15.2'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Required memory-safety gate ──
  memory-safety:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: pnpm install --frozen-lockfile
      - run: |
          set -euo pipefail
          IFS=$'\n\t'
          pnpm zig:check
          export TAOD_CI_HOME="$(mktemp -d)"
          trap 'rm -rf "$TAOD_CI_HOME"' EXIT
          HOME="$TAOD_CI_HOME" pnpm --filter @tao/daemon check
          pnpm zig:leak-check

  # ── Type check + lint + format ──
  check-ubuntu:
    runs-on: ubuntu-latest
    env:
      TAOD_SKIP_NATIVE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  check-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  zig-hardened:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: pnpm install --frozen-lockfile
      - run: zig build test:fmt
        working-directory: apps/daemon
      - run: zig build test:compile -Dfuzz=true
        working-directory: apps/daemon

  check-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  # ── Nix dev shell + Zig LSP smoke test ──
  nix-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix develop --command nixpkgs-fmt --check flake.nix
      - run: |
          nix develop --command bash -lc '
            node --version
            pnpm --version
            zig version
            zls --version
            pnpm zig:fmt:check
            pnpm zig:lint
          '

  # ── Production build ──
  build-ubuntu:
    runs-on: ubuntu-latest
    env:
      TAOD_SKIP_NATIVE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: tao-dist-ubuntu
          path: apps/desktop/out/

  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm smoke:package
      - run: pnpm --filter @tao/desktop test:taod-lifecycle
      - run: |
          set -euo pipefail
          mkdir -p apps/desktop/out/bench
          pnpm bench:startup:budget | tee apps/desktop/out/bench/startup-budget.txt
          pnpm bench:latency:budget | tee apps/desktop/out/bench/latency-budget.txt
          pnpm bench:input-priority:budget | tee apps/desktop/out/bench/input-priority-budget.txt
          pnpm bench:attach:budget | tee apps/desktop/out/bench/attach-budget.txt
          pnpm bench:workspace:budget | tee apps/desktop/out/bench/workspace-budget.txt
          pnpm bench:soak:budget | tee apps/desktop/out/bench/soak-budget.txt
          pnpm bench:reload:budget | tee apps/desktop/out/bench/reload-budget.txt
          pnpm bench:app-soak:budget | tee apps/desktop/out/bench/app-soak-budget.txt
          pnpm bench:taod:budget | tee apps/desktop/out/bench/taod-budget.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tao-dist-macos
          path: apps/desktop/out/

  build-windows:
    name: build-windows (unsupported)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - run: |
          echo "Windows production artifacts are not published yet."
          echo "taod is currently POSIX-only, and Electron packaging skips the daemon binary on Windows."

  # ── Parser benchmark (Linux only) ──
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm bench

  performance-smoke:
    runs-on: macos-15
    env:
      TAO_TERMINAL_BENCH_MIB: '4'
      TAO_TERMINAL_MIN_WEBGL_MBPS: '2'
      TAO_TERMINAL_MAX_P95_FRAME_MS: '80'
      TAO_TERMINAL_MAX_FRAMES_OVER_16: '1000'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: pnpm install --frozen-lockfile
      - run: |
          set -euo pipefail
          mkdir -p apps/desktop/out/bench
          pnpm bench:terminal:budget | tee apps/desktop/out/bench/terminal-budget.txt
          pnpm bench:ipc:budget | tee apps/desktop/out/bench/ipc-budget.txt
          pnpm bench:file-tree:budget | tee apps/desktop/out/bench/file-tree-budget.txt
          pnpm bench:renderer-combined:budget | tee apps/desktop/out/bench/renderer-combined-budget.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tao-performance-budget-macos
          path: apps/desktop/out/bench/*.txt
