name: CI

env:
  ZIG_VERSION: '0.15.2'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Required memory-safety gate (kept separate) ──
  memory-safety:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: |
          set -euo pipefail
          IFS=$'\n\t'
          pnpm zig:check
          export TAOD_CI_HOME="$(mktemp -d)"
          trap 'rm -rf "$TAOD_CI_HOME"' EXIT
          HOME="$TAOD_CI_HOME" pnpm --filter @tao/daemon check
          pnpm zig:leak-check

  # ── Combined quality gate: frontend (pnpm) + zig daemon ──
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TAOD_SKIP_NATIVE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Lint (TypeScript + Zig)
        run: pnpm lint
      - name: Format check (TypeScript + Zig)
        run: pnpm fmt:check
      - name: TypeScript type check
        run: pnpm tsc
      - name: Zig unit tests
        run: pnpm zig:test
      - name: Zig hardened compile (fuzz)
        run: zig build test:compile -Dfuzz=true
        working-directory: apps/daemon
      - name: Persistence tests
        run: pnpm test:persistence

  # ── Build matrix across platforms ──
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: tao-dist-ubuntu
            skip_native: '1'
          - os: macos-15
            artifact: tao-dist-macos
          - os: windows-latest
            artifact: tao-dist-windows
            shell: bash
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
        env:
          TAOD_SKIP_NATIVE: ${{ matrix.skip_native }}
      - uses: actions/upload-artifact@v4
        if: matrix.artifact != 'tao-dist-windows'
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop/out/
