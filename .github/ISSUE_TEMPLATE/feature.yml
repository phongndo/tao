name: ✨ Feature Request
description: Suggest an idea for Tau Terminal.
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: |
        I want to split the terminal into multiple panes so I can run
        different commands side by side.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
      placeholder: |
        A `Cmd+D` shortcut that splits the current terminal horizontally
        and spawns a new shell in the new pane.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Core terminal (parsing, rendering, input)
        - UI/UX (window chrome, tabs, panes)
        - Performance
        - Developer experience (build, CI, tooling)
        - Documentation
    validations:
      required: true
