# Greptile Configuration
# Docs: https://docs.greptile.com

# Greptile indexes your codebase and provides AI-powered code search
# and Q&A. Free for public repos.

# ── Repository ──
repository:
  # Only index these paths (ignore build artifacts and binaries)
  include:
    - apps/**
    - packages/**
    - docs/**
    - scripts/**
    - '*.md'
    - '*.json'
    - '*.ts'
    - '*.yaml'
    - '*.yml'

  exclude:
    - pnpm-lock.yaml
    - out/**
    - dist/**
    - apps/desktop/out/**
    - apps/desktop/dist/**
    - apps/desktop/public/ghostty-vt.wasm
    - node_modules/**

# ── Indexing ──
indexing:
  # What to include in the vector index
  chunk_size: 800 # characters per chunk
  chunk_overlap: 100

  # Prioritize architecture docs for Q&A accuracy
  priority_files:
    - docs/README.md
    - CONTRIBUTING.md
    - apps/desktop/src/main/index.ts
    - apps/desktop/src/renderer/terminal.ts
